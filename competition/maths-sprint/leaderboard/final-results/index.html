<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vertex</title>
    <meta name="description" content="Vertex is a competition operating system for students, schools, and small organisers.">
    <meta name="theme-color" content="#F8FAFC">
    <link rel="icon" href="/assets/logo.png">
    <link rel="apple-touch-icon" href="/assets/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script>
      (function () {
        var redirect = sessionStorage.getItem("vertex:redirect");
        if (redirect) {
          sessionStorage.removeItem("vertex:redirect");
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app" class="app-shell"></div>
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
